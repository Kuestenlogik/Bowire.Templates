name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  merge_group:

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: preview

      - name: Inject release notes + version
        shell: pwsh
        run: ./build.ps1

      - name: dotnet pack
        run: dotnet pack -c Release -o bin/nuget

      - name: Install template
        run: dotnet new install bin/nuget/Kuestenlogik.Bowire.Templates.*.nupkg

      # Templates are special: tests instantiate the template via
      # `dotnet new bowire-plugin` and verify the generated solution
      # builds, instead of running unit tests against this repo's code.
      - name: Smoke-test template variants
        shell: pwsh
        run: ./scripts/test-templates.ps1

      - name: Upload .nupkg artifact
        uses: actions/upload-artifact@v7
        with:
          name: package
          path: bin/nuget/*.nupkg
